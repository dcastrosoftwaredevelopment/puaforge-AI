services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-puaforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-puaforge}
      POSTGRES_DB: ${DB_NAME:-puaforge}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
