services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-puaforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-puaforge}
      POSTGRES_DB: ${DB_NAME:-puaforge}
    volumes:
      - puaforgeai_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-puaforge}']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '5173:5173'
      - '3001:3001'
    command: sh -c "npm install && npm run dev:all"
    environment:
      API_URL: http://localhost:3001
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_PUBLIC_URL: http://localhost:8090
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-puaforge@puaforge.com}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-puaforge}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-puaforge}
      DB_PASSWORD: ${DB_PASSWORD:-puaforge}
      DB_NAME: ${DB_NAME:-puaforge}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-local}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      APP_URL: ${APP_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy


  # PocketBase — http://localhost:8090 (admin: http://localhost:8090/_/)
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    ports:
      - '8090:8090'
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-puaforge@puaforge.com}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-puaforge}
    volumes:
      - puaforgeai_pocketbase:/pb_data

  # Adminer — http://localhost:8080
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy

volumes:
  puaforgeai_postgres:
    name: puaforgeai_postgres
  puaforgeai_pocketbase:
    name: puaforgeai_pocketbase
